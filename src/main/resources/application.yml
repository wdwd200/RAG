spring:
  application:
    name: rag-backend
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:21MB}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:rag_backend}
    username: ${POSTGRES_USER:rag_user}
    password: ${POSTGRES_PASSWORD:rag_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.example.ragbackend

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  storage:
    local-root: ${APP_STORAGE_LOCAL_ROOT:storage/documents}
    allowed-extensions: ${APP_STORAGE_ALLOWED_EXTENSIONS:txt,md,pdf,docx}
    max-file-size-bytes: ${APP_STORAGE_MAX_FILE_SIZE_BYTES:10485760}
  chunk:
    size: ${APP_CHUNK_SIZE:800}
    overlap: ${APP_CHUNK_OVERLAP:100}
  embedding:
    provider: ${APP_EMBEDDING_PROVIDER:mock}
    dimension: ${APP_EMBEDDING_DIMENSION:384}
    qwen:
      model: ${QWEN_EMBEDDING_MODEL:text-embedding-v4}
      base-url: ${QWEN_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY:}
  llm:
    provider: ${APP_LLM_PROVIDER:mock}
    model: ${APP_LLM_MODEL:mock-rag-assistant}
    base-url: ${QWEN_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${DASHSCOPE_API_KEY:}
    temperature: ${APP_LLM_TEMPERATURE:0.2}
    max-tokens: ${APP_LLM_MAX_TOKENS:1000}
  qdrant:
    host: ${QDRANT_HOST:localhost}
    http-port: ${QDRANT_HTTP_PORT:6333}
    collection-name: ${QDRANT_COLLECTION_NAME:rag_chunks}
    vector-size: ${APP_EMBEDDING_DIMENSION:384}
    distance: ${QDRANT_DISTANCE:COSINE}
