spring:
  datasource:
    url: jdbc:h2:mem:rag_backend_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  storage:
    local-root: target/test-storage/documents
    allowed-extensions: txt,md,pdf,docx
    max-file-size-bytes: 20
  chunk:
    size: 8
    overlap: 2
  embedding:
    provider: mock
    dimension: 8
    qwen:
      model: text-embedding-v4
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key:
  llm:
    provider: mock
    model: mock-rag-assistant
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key:
    temperature: 0.2
    max-tokens: 1000
  qdrant:
    host: localhost
    http-port: 6333
    collection-name: rag_chunks_test
    vector-size: 8
    distance: COSINE
