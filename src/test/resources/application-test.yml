spring:
  datasource:
    url: jdbc:h2:mem:rag_backend_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  storage:
    local-root: target/test-storage/documents
    allowed-extensions: txt,md,pdf,docx
    max-file-size-bytes: 20
  chunk:
    size: 8
    overlap: 2
  embedding:
    provider: mock
    dimension: 8
